<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Đăng nhập hệ thống Vinh Khanh Tour." />
  <title>Đăng nhập - Vinh Khanh Tour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260409-1" />
</head>
<body class="public-page auth-page">
  <nav>
    <a href="/" class="logo">🍜 VinhKhanh Culinary Tourism</a>
    <ul class="nav-links">
      <li><a href="/login.html" class="active">Đăng nhập</a></li>
      <li><a href="/register.html">Đăng ký</a></li>
    </ul>
  </nav>

  <main class="auth-shell">
    <section class="auth-card">
      <h1>Đăng nhập</h1>
      <p class="auth-subtitle">Đăng nhập để sử dụng các chức năng AI, bản đồ và thuyết minh tự động.</p>

      <form id="loginForm" class="form-layout auth-form">
        <label class="form-row-wide">
          <span>Email</span>
          <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </label>
        <label class="form-row-wide">
          <span>Mật khẩu</span>
          <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="Tối thiểu 6 ký tự" />
        </label>
        <div class="form-row-wide">
          <button type="submit" class="button button-primary auth-submit">Đăng nhập</button>
        </div>
      </form>

      <p id="authMessage" class="auth-message hidden" role="status" aria-live="polite"></p>
      <p class="auth-switch">Chưa có tài khoản? <a id="registerLink" href="/register.html">Đăng ký ngay</a></p>
    </section>
  </main>

  <script src="/i18n.js?v=20260409-4"></script>
  <script src="/nav.js?v=20260409-4"></script>
  <script src="/login.js?v=20260409-4"></script>
</body>
</html>
