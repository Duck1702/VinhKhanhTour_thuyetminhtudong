<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Gợi ý lộ trình ăn uống bằng AI cho phố ẩm thực Vĩnh Khánh." />
  <title>AI Routing - Vĩnh Khánh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="public-page">
  <nav>
    <a href="/" class="logo">🍜 VinhKhanh Culinary Tourism</a>
    <ul class="nav-links">
      <li><a href="/">Tổng quan</a></li>
      <li><a href="/mon-ngon.html">Món ngon</a></li>
      <li><a href="/ban-do.html">Bản đồ</a></li>
      <li><a href="/ai-routing.html">AI Routing</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1 data-i18n="routing_hero_title">AI Routing</h1>
    <p class="subtitle" data-i18n="routing_hero_subtitle">Tạo lộ trình ăn uống thông minh theo nhóm khách, khung giờ và ngân sách.</p>
  </div>

  <section id="lo-trinh-ai">
    <div class="section-header">
      <div class="icon">🧠</div>
      <div>
        <div class="section-num">Module 03</div>
        <h2 data-i18n="routing_section_title">Gợi ý lộ trình bằng AI</h2>
      </div>
    </div>

    <form id="routeForm" class="form-layout">
      <label>
        <span data-i18n="route_label_visitor_type">Loại khách</span>
        <input id="visitorType" type="text" data-i18n-placeholder="route_placeholder_visitor_type" placeholder="Ví dụ: gia đình, cặp đôi, nhóm bạn" />
      </label>
      <label>
        <span data-i18n="route_label_budget">Ngân sách</span>
        <select id="budgetLevel">
          <option value="" data-i18n="route_option_any">Tùy ý</option>
          <option value="thấp" data-i18n="route_option_low">Thấp</option>
          <option value="vừa" data-i18n="route_option_medium">Vừa</option>
          <option value="cao" data-i18n="route_option_high">Cao</option>
        </select>
      </label>
      <label>
        <span data-i18n="route_label_start_time">Giờ bắt đầu</span>
        <input id="startHour" type="time" />
      </label>
      <label>
        <span data-i18n="route_label_guest_count">Số khách</span>
        <input id="guestCount" type="number" min="1" step="1" placeholder="2" />
      </label>
      <label class="form-row-wide">
        <span data-i18n="route_label_preferences">Sở thích / yêu cầu</span>
        <textarea id="preferences" rows="3" data-i18n-placeholder="route_placeholder_preferences" placeholder="Ví dụ: thích ốc, đi khuya, chỗ ngồi thoải mái, giá dễ chịu"></textarea>
      </label>
      <label class="form-row-wide">
        <span data-i18n="route_label_must_try">Món muốn thử</span>
        <input id="mustTry" type="text" data-i18n-placeholder="route_placeholder_must_try" placeholder="Ví dụ: ốc len xào dừa, cua rang muối, sò điệp nướng" />
      </label>
      <div class="form-row-wide">
        <button type="submit" class="button button-primary" style="width: auto;" data-i18n="btn_route_suggest">Gợi ý lộ trình</button>
      </div>
    </form>

    <div id="routeResult" class="result-box hidden">
      <h3 id="routeTitle"></h3>
      <p><strong data-i18n="route_summary_label">Tóm tắt:</strong> <span id="routeSummary"></span></p>
      <p><strong data-i18n="route_strategy_label">Chiến lược:</strong> <span id="routeStrategy"></span></p>
      <p><strong data-i18n="route_source_label">Nguồn gợi ý:</strong> <span id="routeGeneratedBy" class="code-badge"></span></p>
      <div id="routeStops" class="timeline"></div>
    </div>
  </section>

  <script src="/i18n.js?v=20260407-2"></script>
  <script src="/nav.js"></script>
  <script src="/app.js"></script>
</body>
</html>
