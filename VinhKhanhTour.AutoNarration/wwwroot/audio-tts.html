<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tạo thuyết minh tự động đa ngôn ngữ cho phố ẩm thực Vĩnh Khánh." />
  <title>Audio TTS - Vĩnh Khánh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <nav>
    <a href="/" class="logo">🍜 VinhKhanh Culinary Tourism</a>
    <ul class="nav-links">
      <li><a href="/">Tổng quan</a></li>
      <li><a href="/mon-ngon.html">Món ngon</a></li>
      <li><a href="/ban-do.html">Bản đồ</a></li>
      <li><a href="/ai-routing.html">AI Routing</a></li>
      <li><a href="/audio-tts.html">Audio TTS</a></li>
      <li><a href="/about.html">Chi tiết</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1 data-i18n="audio_hero_title">Audio TTS</h1>
    <p class="subtitle" data-i18n="audio_hero_subtitle">Tạo thuyết minh tự động theo ngôn ngữ và giọng đọc mong muốn.</p>
  </div>

  <section id="thuyet-minh">
    <div class="section-header">
      <div class="icon">🎧</div>
      <div>
        <div class="section-num">Module 04</div>
        <h2 data-i18n="audio_section_title">Thuyết minh tự động</h2>
      </div>
    </div>

    <form id="narrationForm" class="form-layout">
      <label class="form-row-wide">
        <span data-i18n="audio_label_location">Chọn nội dung (POI)</span>
        <select id="locationSelect"></select>
      </label>
      <label class="form-row-wide">
        <span data-i18n="audio_label_template">Hoặc chọn thuyết minh có sẵn</span>
        <select id="templateSelect">
          <option value="" data-i18n="template_none">Không dùng template</option>
        </select>
      </label>
      <label>
        <span data-i18n="audio_label_target_language">Ngôn ngữ đích</span>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
          <option value="fr">Français</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어 (Korean)</option>
        </select>
      </label>
      <label>
        <span data-i18n="audio_label_speaking_rate">Tốc độ đọc</span>
        <input id="speakingRate" type="number" min="0.5" max="2" step="0.05" value="1" />
      </label>
      <label class="form-row-wide">
        <span data-i18n="audio_label_custom_text">Nội dung tùy chỉnh (Ghi đè kịch bản)</span>
        <textarea id="customText" rows="4" data-i18n-placeholder="audio_placeholder_custom_text" placeholder="Để trống nếu muốn dùng nội dung mặc định của POI..."></textarea>
      </label>
      <label class="form-row-wide hidden">
        <input id="voiceName" type="text" />
      </label>
      <div class="form-row-wide">
        <button type="submit" class="button button-primary" style="width: auto;" data-i18n="btn_audio_tts">🎙️ Tạo Audio TTS</button>
      </div>
    </form>

    <div id="narrationResult" class="result-box hidden">
      <h3 data-i18n="audio_result_title">Kết quả Audio</h3>
      <p><strong data-i18n="audio_result_translated_label">Nội dung dịch:</strong> <span id="translatedText"></span></p>
      <p><strong data-i18n="audio_result_voice_label">Giọng đọc (Voice):</strong> <span id="usedVoice" class="code-badge"></span></p>
      <audio id="audioPlayer" controls></audio>
      <a id="audioLink" class="button button-secondary" href="#" target="_blank" rel="noreferrer" style="font-size:0.85rem; margin-top:0.5rem; display:inline-block" data-i18n="audio_result_download_cta">Tải xuống / Mở tab mới</a>
    </div>
  </section>

  <script src="/i18n.js?v=20260407-2"></script>
  <script src="/nav.js"></script>
  <script src="/location-i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
