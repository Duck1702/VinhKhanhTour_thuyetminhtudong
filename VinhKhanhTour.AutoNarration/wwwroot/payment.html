<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Thanh toán để nghe thuyết minh quán ăn Vĩnh Khánh." />
  <title>Thanh toán - Vĩnh Khánh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260416-1" />
</head>
<body class="public-page page-full">
  <nav>
    <a href="/" class="logo">🍜 VinhKhanh Culinary Tourism</a>
    <ul class="nav-links">
      <li><a href="/">Tổng quan</a></li>
      <li><a href="/mon-ngon.html">Món ngon</a></li>
      <li><a href="/ban-do.html">Bản đồ</a></li>
      <li><a href="/ai-routing.html">AI Routing</a></li>
    </ul>
  </nav>

  <main class="payment-page">
    <section class="payment-card">
      <h1 id="paymentTitle">Thanh toán</h1>
      
      <div id="paymentContent" class="payment-content">
        <!-- Location preview -->
        <div id="locationPreview" class="payment-location-preview">
          <h2 id="locationName" class="payment-location-name">Đang tải...</h2>
          <p id="locationInfo" class="payment-location-info"></p>
        </div>

        <!-- Price display -->
        <div class="payment-price-section">
          <div class="payment-price-row">
            <span id="priceLabel">Giá:</span>
            <strong id="priceDisplay">--</strong>
          </div>
          <p id="priceNote" class="payment-price-note"></p>
        </div>

        <!-- Language selector -->
        <div class="payment-language-section">
          <label for="paymentLanguageSelect" id="paymentLanguageLabel">Ngôn ngữ thuyết minh:</label>
          <select id="paymentLanguageSelect">
            <option value="vi">Tiếng Việt</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
        </div>

        <!-- Payment button -->
        <div class="payment-actions">
          <button id="paymentConfirmBtn" type="button" class="button button-primary">
            💳 Xác nhận thanh toán
          </button>
          <button id="paymentCancelBtn" type="button" class="button button-secondary">
            Quay lại danh sách
          </button>
        </div>

        <!-- Error message -->
        <div id="paymentError" class="payment-error hidden"></div>
      </div>

      <div id="paymentLoading" class="payment-loading hidden">
        <p>Đang xử lý thanh toán...</p>
      </div>
    </section>
  </main>

  <script src="/i18n.js?v=20260409-4"></script>
  <script src="nav.js?v=20260416-4"></script>
  <script src="/location-i18n.js?v=20260408-6"></script>
  <script src="/payment.js?v=20260416-1"></script>
</body>
</html>
