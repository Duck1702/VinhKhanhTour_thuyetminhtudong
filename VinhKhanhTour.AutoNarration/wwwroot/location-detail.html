<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Chi tiết quán ăn Vĩnh Khánh." />
  <title>Chi tiết quán - Vĩnh Khánh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260416-1" />
</head>
<body class="public-page page-full">
  <nav>
    <a href="/" class="logo">🍜 VinhKhanh Culinary Tourism</a>
    <ul class="nav-links">
      <li><a href="/">Tổng quan</a></li>
      <li><a href="/mon-ngon.html">Món ngon</a></li>
      <li><a href="/ban-do.html">Bản đồ</a></li>
      <li><a href="/ai-routing.html">AI Routing</a></li>
    </ul>
  </nav>

  <main class="location-detail-page">
    <section class="location-detail-card">
      <div id="detailContent" class="location-detail-content">
        <!-- Location title -->
        <h1 id="detailLocationName" class="location-detail-name">Đang tải...</h1>
        <p id="detailLocationCategory" class="location-detail-category"></p>

        <!-- Location image -->
        <div id="detailImageContainer" class="location-detail-image-container"></div>

        <!-- Details section -->
        <div class="location-detail-section">
          <h2>Thông tin cơ bản</h2>
          <div class="location-detail-meta">
            <div class="meta-item">
              <strong>📍 Địa chỉ:</strong>
              <p id="detailAddress"></p>
            </div>
            <div class="meta-item">
              <strong>🕐 Giờ mở cửa:</strong>
              <p id="detailHours"></p>
            </div>
            <div class="meta-item">
              <strong>📞 Số điện thoại:</strong>
              <p id="detailPhone"></p>
            </div>
            <div class="meta-item">
              <strong>💰 Giá tham khảo:</strong>
              <p id="detailPrice"></p>
            </div>
            <div class="meta-item">
              <strong>⭐ Thời gian tốt nhất:</strong>
              <p id="detailBestTime"></p>
            </div>
          </div>
        </div>

        <!-- Highlight & Description -->
        <div class="location-detail-section">
          <h2>Điểm nhấn và mô tả</h2>
          <div class="location-detail-text">
            <p id="detailHighlight"></p>
            <p id="detailShortIntro"></p>
            <p id="detailDescription"></p>
            <p id="detailDishes"></p>
          </div>
        </div>

        <!-- Narration -->
        <div class="location-detail-section">
          <h2>Nghe thuyết minh</h2>
          <div class="location-narration-actions">
            <button id="detailPlayBtn" type="button" class="button button-primary">
              🔊 Nghe thuyết minh
            </button>
            <button id="detailStopBtn" type="button" class="button button-secondary" style="display: none;">
              ⏹️ Dừng
            </button>
            <button id="detailBackBtn" type="button" class="button button-secondary">
              ← Quay lại danh sách
            </button>
          </div>
          <audio id="detailAudioPlayer" class="location-audio-player" style="width: 100%; margin-top: 1rem;"></audio>
        </div>

        <!-- Error message -->
        <div id="detailError" class="detail-error hidden"></div>
      </div>

      <div id="detailLoading" class="detail-loading hidden">
        <p>Đang tải chi tiết quán...</p>
      </div>
    </section>
  </main>

  <script src="/i18n.js?v=20260409-4"></script>
  <script src="nav.js?v=20260416-4"></script>
  <script src="/location-i18n.js?v=20260408-6"></script>
  <script src="/location-detail.js?v=20260416-2"></script>
</body>
</html>
